spring:
  datasource:
    url: jdbc:h2:mem:shumelahire;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: false

  h2:
    console:
      enabled: false

  data:
    redis:
      repositories:
        enabled: false
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

  cache:
    type: simple

logging:
  level:
    com.arthmatic.shumelahire: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
