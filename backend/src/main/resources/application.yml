server:
  port: 8080

spring:
  application:
    name: shumelahire-backend

  # H2 Database Configuration (development)
  datasource:
    url: jdbc:h2:mem:shumelahire
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # JPA Configuration
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # H2 Console (for development/testing)
  h2:
    console:
      enabled: true
      path: /h2-console

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
  refresh-expiration: 604800000

# Encryption
encryption:
  key: ${ENCRYPTION_KEY}

# Storage
storage:
  provider: ${STORAGE_PROVIDER:local}

# S3 Configuration (used when storage.provider=s3)
s3:
  bucket: ${S3_BUCKET:shumelahire-documents}
  region: ${S3_REGION:af-south-1}
  access-key: ${S3_ACCESS_KEY:}
  secret-key: ${S3_SECRET_KEY:}

# E-Signature
esignature:
  provider: ${ESIGNATURE_PROVIDER:docusign}

# DocuSign Configuration
docusign:
  base-url: ${DOCUSIGN_BASE_URL:https://demo.docusign.net/restapi}
  account-id: ${DOCUSIGN_ACCOUNT_ID:}
  integration-key: ${DOCUSIGN_INTEGRATION_KEY:}
  secret-key: ${DOCUSIGN_SECRET_KEY:}
  user-id: ${DOCUSIGN_USER_ID:}
  webhook-hmac-key: ${DOCUSIGN_WEBHOOK_HMAC_KEY:}

# Data Residency
data-residency:
  region: ${DATA_RESIDENCY_REGION:ZA}
  provider: ${DATA_RESIDENCY_PROVIDER:local}
  compliance-standard: POPIA

# File Upload
app:
  file:
    upload-dir: ${UPLOAD_DIR:uploads}

# SSO Configuration
sso:
  enabled: ${SSO_ENABLED:false}
  default-role: EMPLOYEE
  auto-provision-users: true

# AI Configuration
ai:
  enabled: ${AI_ENABLED:false}
  provider: ${AI_PROVIDER:mock}
  claude:
    api-key: ${CLAUDE_API_KEY:}
    model: ${CLAUDE_MODEL:claude-sonnet-4-20250514}
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4o}

# Job Board Configuration
job-boards:
  linkedin:
    enabled: ${LINKEDIN_ENABLED:false}
    api-key: ${LINKEDIN_API_KEY:}
    api-secret: ${LINKEDIN_API_SECRET:}
    org-id: ${LINKEDIN_ORG_ID:}

# Logging Configuration
logging:
  level:
    com.arthmatic.shumelahire: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# Management endpoints for monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
