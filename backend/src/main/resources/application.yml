server:
  port: 8080

spring:
  application:
    name: shumelahire-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:}
  expiration: 86400000
  refresh-expiration: 604800000

# Encryption
encryption:
  key: ${ENCRYPTION_KEY:}

# Storage
storage:
  provider: ${STORAGE_PROVIDER:local}

# S3 Configuration (used when storage.provider=s3)
s3:
  bucket: ${S3_BUCKET:shumelahire-documents}
  region: ${S3_REGION:af-south-1}
  access-key: ${S3_ACCESS_KEY:}
  secret-key: ${S3_SECRET_KEY:}

# E-Signature
esignature:
  provider: ${ESIGNATURE_PROVIDER:docusign}

# DocuSign Configuration
docusign:
  base-url: ${DOCUSIGN_BASE_URL:https://demo.docusign.net/restapi}
  account-id: ${DOCUSIGN_ACCOUNT_ID:}
  integration-key: ${DOCUSIGN_INTEGRATION_KEY:}
  secret-key: ${DOCUSIGN_SECRET_KEY:}
  user-id: ${DOCUSIGN_USER_ID:}
  webhook-hmac-key: ${DOCUSIGN_WEBHOOK_HMAC_KEY:}
  private-key: ${DOCUSIGN_PRIVATE_KEY:}
  auth-server: ${DOCUSIGN_AUTH_SERVER:https://account-d.docusign.com}

# Data Residency
data-residency:
  region: ${DATA_RESIDENCY_REGION:ZA}
  provider: ${DATA_RESIDENCY_PROVIDER:local}
  compliance-standard: POPIA

# File Upload
app:
  file:
    upload-dir: ${UPLOAD_DIR:uploads}

# AI Configuration
ai:
  enabled: ${AI_ENABLED:false}
  provider: ${AI_PROVIDER:mock}
  claude:
    api-key: ${CLAUDE_API_KEY:}
    model: ${CLAUDE_MODEL:claude-sonnet-4-20250514}
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4o}

# Job Board Configuration
job-boards:
  linkedin:
    enabled: ${LINKEDIN_ENABLED:false}
    api-key: ${LINKEDIN_API_KEY:}
    api-secret: ${LINKEDIN_API_SECRET:}
    org-id: ${LINKEDIN_ORG_ID:}
  indeed:
    enabled: ${INDEED_ENABLED:false}
    employer-id: ${INDEED_EMPLOYER_ID:}
    api-token: ${INDEED_API_TOKEN:}
  pnet:
    enabled: ${PNET_ENABLED:false}
    api-key: ${PNET_API_KEY:}
  career-junction:
    enabled: ${CAREER_JUNCTION_ENABLED:false}
    api-key: ${CAREER_JUNCTION_API_KEY:}
    partner-id: ${CAREER_JUNCTION_PARTNER_ID:}

# LinkedIn Social Posting (company page)
linkedin:
  social:
    enabled: ${LINKEDIN_SOCIAL_ENABLED:false}
    client-id: ${LINKEDIN_SOCIAL_CLIENT_ID:}
    client-secret: ${LINKEDIN_SOCIAL_CLIENT_SECRET:}
    redirect-uri: ${LINKEDIN_SOCIAL_REDIRECT_URI:http://localhost:8080/api/linkedin/social/auth/callback}

# Background Check / Verification
background-check:
  provider: ${BACKGROUND_CHECK_PROVIDER:dots-africa}

# Dots Africa Verification (NCR-accredited — NCRCB38)
dots-africa:
  base-url: ${DOTS_AFRICA_BASE_URL:https://api.dotsafrica.com/v1}
  api-key: ${DOTS_AFRICA_API_KEY:}
  client-id: ${DOTS_AFRICA_CLIENT_ID:}

# SAP Payroll Integration
sap:
  payroll:
    enabled: ${SAP_PAYROLL_ENABLED:false}
    base-url: ${SAP_PAYROLL_BASE_URL:}
    client-id: ${SAP_PAYROLL_CLIENT_ID:}
    client-secret: ${SAP_PAYROLL_CLIENT_SECRET:}
    auth-url: ${SAP_PAYROLL_AUTH_URL:}
    company-code: ${SAP_PAYROLL_COMPANY_CODE:}
    payroll-area: ${SAP_PAYROLL_PAYROLL_AREA:}

# Notification Configuration
notification:
  email:
    enabled: ${NOTIFICATION_EMAIL_ENABLED:true}
  sqs:
    enabled: ${NOTIFICATION_SQS_ENABLED:false}
    queue-url: ${SQS_NOTIFICATION_QUEUE_URL:}

# AWS SES Email
ses:
  enabled: ${SES_ENABLED:false}
  region: ${SES_REGION:af-south-1}
  from-email: ${SES_FROM_EMAIL:noreply@shumelahire.co.za}
  from-name: ${SES_FROM_NAME:ShumelaHire}

# Microsoft Graph (Teams + Outlook)
microsoft:
  enabled: ${MICROSOFT_ENABLED:false}
  tenant-id: ${MICROSOFT_TENANT_ID:}
  client-id: ${MICROSOFT_CLIENT_ID:}
  client-secret: ${MICROSOFT_CLIENT_SECRET:}
  teams:
    webhook-url: ${TEAMS_WEBHOOK_URL:}
  outlook:
    calendar-user: ${OUTLOOK_CALENDAR_USER:}

# Management endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized

# OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
