# Hybrid deployment profile: SQL Server + local storage + cloud sync
# For on-premises installations with Hyper-V VM running Spring Boot
spring:
  datasource:
    url: ${DATABASE_URL:jdbc:sqlserver://localhost:1433;databaseName=shumelahire;encrypt=true;trustServerCertificate=true}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASS}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    database-platform: org.hibernate.dialect.SQLServerDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration-sqlserver

  h2:
    console:
      enabled: false

  # Redis disabled for hybrid — uses ConcurrentMapCache
  data:
    redis:
      repositories:
        enabled: false
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

  cache:
    type: simple

# Use local file storage for hybrid
storage:
  provider: local

app:
  file:
    upload-dir: ${UPLOAD_DIR:/opt/shumelahire/uploads}

# Deployment mode indicator
deployment:
  mode: hybrid

logging:
  level:
    com.arthmatic.shumelahire: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
