spring:
  task:
    scheduling:
      pool:
        size: 1
  security:
    oauth2:
      resourceserver:
        jwt:
          # Override issuer-uri with direct jwk-set-uri to skip OpenID Connect discovery
          # and avoid repeated HTTP round-trips from Lambda to Cognito.
          issuer-uri: ${COGNITO_ISSUER_URI}
          jwk-set-uri: ${COGNITO_ISSUER_URI}/.well-known/jwks.json

dynamodb:
  table-name: ${DYNAMODB_TABLE_NAME}

aws:
  dynamodb:
    table-name: ${DYNAMODB_TABLE_NAME}
  region: ${AWS_REGION_OVERRIDE:af-south-1}

logging:
  level:
    com.arthmatic.shumelahire: INFO
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
