<?xml version="1.0" encoding="UTF-8"?>
<!-- ShumelaHire — Favicon — Simplified for 16x16/32x32 rendering -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="4" fill="#05527E"/>
  <g transform="translate(16, 16)">
    <!-- Simplified: 3 satellite nodes + hub only -->
    <line x1="0" y1="0" x2="9" y2="-7" stroke="#FFFFFF" stroke-width="1.2" opacity="0.15"/>
    <line x1="0" y1="0" x2="-10" y2="3" stroke="#FFFFFF" stroke-width="1.2" opacity="0.15"/>
    <line x1="0" y1="0" x2="4" y2="10" stroke="#FFFFFF" stroke-width="1.2" opacity="0.15"/>

    <circle cx="9" cy="-7" r="2.5" fill="#FFFFFF"/>
    <circle cx="-10" cy="3" r="2.5" fill="#FFFFFF"/>
    <circle cx="4" cy="10" r="2" fill="#FFFFFF" opacity="0.6"/>

    <!-- Central hub -->
    <circle cx="0" cy="0" r="4" fill="#F1C54B"/>
    <circle cx="0" cy="0" r="2" fill="#05527E"/>
  </g>
</svg>
