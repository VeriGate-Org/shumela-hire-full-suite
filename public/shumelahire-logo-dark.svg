<?xml version="1.0" encoding="UTF-8"?>
<!-- ShumelaHire — Orbital Hub — Full Logo for Dark Backgrounds -->
<!-- Use on backgrounds: #032E49, #0F172A, #1E293B, or similar dark tones -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" width="360" height="80">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@800&amp;display=swap');
    </style>
  </defs>

  <!-- Orbital Hub Icon -->
  <g transform="translate(30, 40)">
    <!-- Orbital ring -->
    <ellipse cx="0" cy="0" rx="26" ry="26" stroke="#FFFFFF" stroke-width="0.8" fill="none" opacity="0.06"/>
    <ellipse cx="0" cy="0" rx="16" ry="16" stroke="#FFFFFF" stroke-width="0.6" fill="none" opacity="0.04"/>

    <!-- Connection lines to hub -->
    <line x1="0" y1="0" x2="22" y2="-14" stroke="#FFFFFF" stroke-width="1.2" opacity="0.1"/>
    <line x1="0" y1="0" x2="-18" y2="-20" stroke="#FFFFFF" stroke-width="1.2" opacity="0.1"/>
    <line x1="0" y1="0" x2="-24" y2="10" stroke="#FFFFFF" stroke-width="1.2" opacity="0.1"/>
    <line x1="0" y1="0" x2="10" y2="24" stroke="#FFFFFF" stroke-width="1.2" opacity="0.1"/>
    <line x1="0" y1="0" x2="26" y2="6" stroke="#FFFFFF" stroke-width="1.2" opacity="0.1"/>

    <!-- Satellite nodes -->
    <circle cx="22" cy="-14" r="4" fill="#FFFFFF"/>
    <circle cx="-18" cy="-20" r="3.5" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="-24" cy="10" r="4" fill="#FFFFFF"/>
    <circle cx="10" cy="24" r="3.5" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="26" cy="6" r="3" fill="#FFFFFF" opacity="0.4"/>

    <!-- Tiny outer satellites -->
    <circle cx="14" cy="-24" r="2" fill="#FFFFFF" opacity="0.15"/>
    <circle cx="-10" cy="26" r="2" fill="#FFFFFF" opacity="0.15"/>

    <!-- Central hub -->
    <circle cx="0" cy="0" r="7" fill="#F1C54B"/>
    <circle cx="0" cy="0" r="3.5" fill="#032E49"/>
  </g>

  <!-- Wordmark -->
  <text x="68" y="42" font-family="'Manrope', sans-serif" font-size="30" font-weight="800" letter-spacing="-0.5">
    <tspan fill="#FFFFFF">Shumela</tspan><tspan fill="#F1C54B">Hire</tspan>
  </text>

  <!-- Tagline -->
  <text x="68" y="60" font-family="'Manrope', sans-serif" font-size="9" font-weight="600" fill="rgba(255,255,255,0.35)" letter-spacing="3">TALENT ACQUISITION PLATFORM</text>
</svg>
