<?xml version="1.0" encoding="UTF-8"?>
<!-- ShumelaHire — Orbital Hub — Standalone Icon (full color, transparent BG) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <g transform="translate(32, 32)">
    <!-- Orbital ring -->
    <ellipse cx="0" cy="0" rx="22" ry="22" stroke="#05527E" stroke-width="0.7" fill="none" opacity="0.1"/>

    <!-- Connection lines -->
    <line x1="0" y1="0" x2="18" y2="-12" stroke="#05527E" stroke-width="1" opacity="0.15"/>
    <line x1="0" y1="0" x2="-16" y2="-16" stroke="#05527E" stroke-width="1" opacity="0.15"/>
    <line x1="0" y1="0" x2="-20" y2="8" stroke="#05527E" stroke-width="1" opacity="0.15"/>
    <line x1="0" y1="0" x2="8" y2="20" stroke="#05527E" stroke-width="1" opacity="0.15"/>
    <line x1="0" y1="0" x2="22" y2="4" stroke="#05527E" stroke-width="1" opacity="0.15"/>

    <!-- Satellite nodes -->
    <circle cx="18" cy="-12" r="3.5" fill="#05527E"/>
    <circle cx="-16" cy="-16" r="3" fill="#05527E" opacity="0.6"/>
    <circle cx="-20" cy="8" r="3.5" fill="#05527E"/>
    <circle cx="8" cy="20" r="3" fill="#05527E" opacity="0.6"/>
    <circle cx="22" cy="4" r="2.5" fill="#05527E" opacity="0.4"/>

    <!-- Central hub -->
    <circle cx="0" cy="0" r="6" fill="#F1C54B"/>
    <circle cx="0" cy="0" r="3" fill="#FFFFFF"/>
  </g>
</svg>
