name: Deploy

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      aws-region:
        required: true
        type: string
        default: af-south-1
      domain-name:
        required: true
        type: string
        default: shumelahire.co.za
      hosted-zone-name:
        required: false
        type: string
        default: ""
    secrets:
      AWS_ROLE_ARN:
        required: true
      CERTIFICATE_ARN:
        required: false
      API_CERTIFICATE_ARN:
        required: false
      WILDCARD_CERTIFICATE_ARN:
        required: false
      LINKEDIN_CLIENT_ID:
        required: false
      LINKEDIN_CLIENT_SECRET:
        required: false
      CLAUDE_API_KEY:
        required: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws-region }}

      # ── Set Spring profile ───────────────────────────────────────────────
      - name: Set Spring profile
        id: spring-profile
        run: |
          if [ "${{ inputs.environment }}" = "dev" ]; then
            echo "profile=cloud" >> $GITHUB_OUTPUT
          else
            echo "profile=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          fi

      # ── Backend JAR ────────────────────────────────────────────────────
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build backend JAR
        working-directory: backend
        run: mvn clean package -DskipTests -q

      # ── CDK Setup ────────────────────────────────────────────────────────
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: CDK Prepare
        working-directory: infra/cdk
        run: |
          npm install -g aws-cdk
          dotnet restore
          dotnet build --no-restore

      - name: CDK Bootstrap
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGION=${{ inputs.aws-region }}
          BUCKET_NAME="cdk-hnb659fds-assets-${ACCOUNT_ID}-${REGION}"

          # If the CDKToolkit stack is missing but the staging bucket exists (orphaned),
          # remove the orphaned bucket so bootstrap can recreate it cleanly.
          # CDK will re-upload assets during the deploy phase.
          if ! aws cloudformation describe-stacks --stack-name CDKToolkit --region ${REGION} >/dev/null 2>&1; then
            if aws s3api head-bucket --bucket ${BUCKET_NAME} 2>/dev/null; then
              echo "Removing orphaned CDK staging bucket..."
              aws s3 rm s3://${BUCKET_NAME} --recursive --region ${REGION}
              aws s3api delete-bucket --bucket ${BUCKET_NAME} --region ${REGION}
            fi
          fi

          cdk bootstrap aws://${ACCOUNT_ID}/${REGION}

      # ── Resolve hosted zone name (defaults to domain-name) ────────────
      - name: Resolve hosted zone name
        id: zone
        run: |
          ZONE="${{ inputs.hosted-zone-name }}"
          if [ -z "$ZONE" ]; then
            ZONE="${{ inputs.domain-name }}"
          fi
          echo "name=$ZONE" >> $GITHUB_OUTPUT

      # ── Compute environment URLs ─────────────────────────────────────
      - name: Compute frontend URL
        id: urls
        run: |
          if [ "${{ inputs.environment }}" = "prod" ]; then
            echo "app_url=https://${{ inputs.domain-name }}" >> $GITHUB_OUTPUT
          else
            echo "app_url=https://${{ inputs.environment }}.${{ inputs.domain-name }}" >> $GITHUB_OUTPUT
          fi

      # ── Phase 1: Deploy foundation (VPC, DB, ECR repos, Cognito) ──────
      - name: Cleanup foundation stack and orphaned resources
        run: |
          PREFIX="shumelahire-${{ inputs.environment }}"
          STACK_NAME="${PREFIX}-foundation"
          REGION="${{ inputs.aws-region }}"

          STATUS=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" --region "$REGION" \
            --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "DOES_NOT_EXIST")
          echo "Foundation stack status: $STATUS"

          # If stack is stuck in a failed state, delete it entirely
          if [ "$STATUS" = "ROLLBACK_COMPLETE" ] || [ "$STATUS" = "UPDATE_ROLLBACK_COMPLETE" ] || [ "$STATUS" = "REVIEW_IN_PROGRESS" ]; then
            echo "Deleting $STACK_NAME (stuck in $STATUS)..."
            aws cloudformation delete-stack --stack-name "$STACK_NAME" --region "$REGION"
            aws cloudformation wait stack-delete-complete --stack-name "$STACK_NAME" --region "$REGION"
            echo "$STACK_NAME deleted."
            STATUS="DOES_NOT_EXIST"
          fi

          # Helper: check if a resource exists in the CloudFormation stack
          resource_in_stack() {
            local logical_id="$1"
            if [ "$STATUS" = "DOES_NOT_EXIST" ]; then return 1; fi
            aws cloudformation describe-stack-resource --stack-name "$STACK_NAME" --logical-resource-id "$logical_id" \
              --region "$REGION" >/dev/null 2>&1
          }

          # Clean up resources that exist in AWS but NOT in the stack
          # Log group
          if aws logs describe-log-groups --log-group-name-prefix "/ecs/${PREFIX}" --region "$REGION" \
              --query "logGroups[?logGroupName=='/ecs/${PREFIX}']" --output text 2>/dev/null | grep -q "/ecs/${PREFIX}"; then
            if ! resource_in_stack "EcsLogGroup"; then
              echo "Deleting orphaned log group /ecs/${PREFIX}"
              aws logs delete-log-group --log-group-name "/ecs/${PREFIX}" --region "$REGION"
            fi
          fi

          # S3 buckets
          for bucket_info in "docs:DocumentsBucket9EC9DEB9" "file-uploads:UploadsBucket5E5E9B64"; do
            SUFFIX="${bucket_info%%:*}"
            LOGICAL_ID="${bucket_info##*:}"
            BUCKET="${PREFIX}-${SUFFIX}"
            if aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
              if ! resource_in_stack "$LOGICAL_ID"; then
                echo "Deleting orphaned S3 bucket $BUCKET"
                aws s3 rm "s3://${BUCKET}" --recursive --region "$REGION" 2>/dev/null || true
                aws s3api delete-bucket --bucket "$BUCKET" --region "$REGION" 2>/dev/null || true
              fi
            fi
          done

          # ECR repos
          for repo_info in "shumelahire-backend:BackendRepo7FFBAD06" "shumelahire-frontend:FrontendRepoF80FCC01"; do
            REPO="${repo_info%%:*}"
            LOGICAL_ID="${repo_info##*:}"
            if aws ecr describe-repositories --repository-names "$REPO" --region "$REGION" >/dev/null 2>&1; then
              if ! resource_in_stack "$LOGICAL_ID"; then
                echo "Deleting orphaned ECR repo $REPO"
                aws ecr delete-repository --repository-name "$REPO" --region "$REGION" --force 2>/dev/null || true
              fi
            fi
          done

          echo "Cleanup complete."

      - name: CDK Deploy Foundation
        working-directory: infra/cdk
        env:
          SHUMELAHIRE_ENV: ${{ inputs.environment }}
          SHUMELAHIRE_DOMAIN: ${{ inputs.domain-name }}
          CERTIFICATE_ARN: ${{ secrets.CERTIFICATE_ARN }}
          API_CERTIFICATE_ARN: ${{ secrets.API_CERTIFICATE_ARN }}
          WILDCARD_CERTIFICATE_ARN: ${{ secrets.WILDCARD_CERTIFICATE_ARN }}
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
        run: |
          cdk deploy shumelahire-${{ inputs.environment }}-foundation --require-approval never \
            -c env=${{ inputs.environment }} \
            -c domain=${{ inputs.domain-name }} \
            -c hostedZoneName=${{ steps.zone.outputs.name }} \
            -c certificateArn="${CERTIFICATE_ARN}" \
            -c apiCertificateArn="${API_CERTIFICATE_ARN}" \
            -c wildcardCertificateArn="${WILDCARD_CERTIFICATE_ARN}" \
            -c linkedInClientId="${LINKEDIN_CLIENT_ID}" \
            -c linkedInClientSecret="${LINKEDIN_CLIENT_SECRET}"

      # ── Seed secrets with real values (first deploy only) ───────────────
      - name: Seed secrets
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          ENV="${{ inputs.environment }}"
          REGION="${{ inputs.aws-region }}"

          seed_if_default() {
            local secret_id="$1"
            local new_value="$2"

            # Retrieve current value; CDK creates secrets with a random placeholder
            current=$(aws secretsmanager get-secret-value --secret-id "$secret_id" \
              --region "$REGION" --query SecretString --output text 2>/dev/null || echo "MISSING")

            if [ "$current" = "MISSING" ]; then
              echo "Secret $secret_id does not exist yet, skipping."
              return
            fi

            # CDK-generated secrets are short random passwords — only overwrite
            # if the value looks like a CDK default (≤32 chars) or is empty
            if [ ${#current} -le 32 ] && [ -n "$new_value" ]; then
              aws secretsmanager put-secret-value \
                --secret-id "$secret_id" \
                --secret-string "$new_value" \
                --region "$REGION"
              echo "Seeded $secret_id"
            else
              echo "$secret_id already has a custom value, skipping."
            fi
          }

          # JWT secret — generate a strong 64-byte base64 key
          JWT_VALUE=$(openssl rand -base64 64 | tr -d '\n')
          seed_if_default "shumelahire/${ENV}/jwt-secret" "$JWT_VALUE"

          # Encryption key — generate a 32-byte (AES-256) base64 key
          ENC_VALUE=$(openssl rand -base64 32 | tr -d '\n')
          seed_if_default "shumelahire/${ENV}/encryption-key" "$ENC_VALUE"

          # Claude API key — from GitHub secret
          if [ -n "$CLAUDE_API_KEY" ]; then
            seed_if_default "shumelahire/${ENV}/ai-keys" "$CLAUDE_API_KEY"
          else
            echo "WARNING: CLAUDE_API_KEY not set — AI features will fail at runtime."
          fi

      # ── Get CDK outputs (Cognito IDs for frontend build) ────────────────
      - name: Get CDK outputs
        id: cdk-outputs
        run: |
          PREFIX="shumelahire-${{ inputs.environment }}"
          echo "user_pool_id=$(aws cloudformation describe-stacks --stack-name ${PREFIX}-foundation --query 'Stacks[0].Outputs[?OutputKey==`UserPoolId`].OutputValue' --output text)" >> $GITHUB_OUTPUT
          echo "user_pool_client_id=$(aws cloudformation describe-stacks --stack-name ${PREFIX}-foundation --query 'Stacks[0].Outputs[?OutputKey==`UserPoolClientId`].OutputValue' --output text)" >> $GITHUB_OUTPUT
          echo "cognito_domain=$(aws cloudformation describe-stacks --stack-name ${PREFIX}-foundation --query 'Stacks[0].Outputs[?OutputKey==`CognitoDomain`].OutputValue' --output text)" >> $GITHUB_OUTPUT

      # ── Phase 2: Push Docker images (ECR repos now exist) ──────────────
      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend Docker image
        working-directory: backend
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          SPRING_PROFILES_ACTIVE: ${{ steps.spring-profile.outputs.profile }}
        run: |
          docker build \
            --build-arg SPRING_PROFILES_ACTIVE=$SPRING_PROFILES_ACTIVE \
            -t $ECR_REGISTRY/shumelahire-backend:$IMAGE_TAG \
            -t $ECR_REGISTRY/shumelahire-backend:latest \
            .
          docker push --all-tags $ECR_REGISTRY/shumelahire-backend

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Build and push frontend Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL="" \
            --build-arg NEXT_PUBLIC_APP_URL=${{ steps.urls.outputs.app_url }} \
            --build-arg NEXT_PUBLIC_COGNITO_USER_POOL_ID=${{ steps.cdk-outputs.outputs.user_pool_id }} \
            --build-arg NEXT_PUBLIC_COGNITO_CLIENT_ID=${{ steps.cdk-outputs.outputs.user_pool_client_id }} \
            --build-arg NEXT_PUBLIC_COGNITO_DOMAIN=${{ steps.cdk-outputs.outputs.cognito_domain }} \
            --build-arg NEXT_PUBLIC_REGION=${{ inputs.aws-region }} \
            -t $ECR_REGISTRY/shumelahire-frontend:$IMAGE_TAG \
            -t $ECR_REGISTRY/shumelahire-frontend:latest \
            .
          docker push --all-tags $ECR_REGISTRY/shumelahire-frontend

      # ── Phase 3: Deploy compute, API, frontend stacks ──────────────────
      - name: Cleanup ROLLBACK_COMPLETE stacks
        run: |
          PREFIX="shumelahire-${{ inputs.environment }}"
          for STACK_NAME in "${PREFIX}-compute" "${PREFIX}-api" "${PREFIX}-frontend"; do
            STATUS=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" --region ${{ inputs.aws-region }} \
              --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "DOES_NOT_EXIST")
            if [ "$STATUS" = "ROLLBACK_COMPLETE" ] || [ "$STATUS" = "UPDATE_ROLLBACK_COMPLETE" ]; then
              echo "Deleting $STACK_NAME (stuck in ROLLBACK_COMPLETE)..."
              aws cloudformation delete-stack --stack-name "$STACK_NAME" --region ${{ inputs.aws-region }}
              aws cloudformation wait stack-delete-complete --stack-name "$STACK_NAME" --region ${{ inputs.aws-region }}
              echo "$STACK_NAME deleted."
            fi
          done

      - name: CDK Deploy Services
        working-directory: infra/cdk
        env:
          SHUMELAHIRE_ENV: ${{ inputs.environment }}
          SHUMELAHIRE_DOMAIN: ${{ inputs.domain-name }}
          CERTIFICATE_ARN: ${{ secrets.CERTIFICATE_ARN }}
          API_CERTIFICATE_ARN: ${{ secrets.API_CERTIFICATE_ARN }}
          WILDCARD_CERTIFICATE_ARN: ${{ secrets.WILDCARD_CERTIFICATE_ARN }}
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
        run: |
          cdk deploy --all --require-approval never \
            -c env=${{ inputs.environment }} \
            -c domain=${{ inputs.domain-name }} \
            -c hostedZoneName=${{ steps.zone.outputs.name }} \
            -c certificateArn="${CERTIFICATE_ARN}" \
            -c apiCertificateArn="${API_CERTIFICATE_ARN}" \
            -c wildcardCertificateArn="${WILDCARD_CERTIFICATE_ARN}" \
            -c linkedInClientId="${LINKEDIN_CLIENT_ID}" \
            -c linkedInClientSecret="${LINKEDIN_CLIENT_SECRET}"

      # ── Force ECS Redeployment ──────────────────────────────────────────
      - name: Force ECS redeployment
        run: |
          CLUSTER="shumelahire-${{ inputs.environment }}"
          aws ecs update-service --cluster $CLUSTER --service shumelahire-${{ inputs.environment }} --force-new-deployment
          aws ecs update-service --cluster $CLUSTER --service shumelahire-${{ inputs.environment }}-frontend --force-new-deployment
