name: Deploy

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      aws-region:
        required: true
        type: string
        default: af-south-1
      domain-name:
        required: true
        type: string
        default: shumelahire.co.za
      hosted-zone-name:
        required: false
        type: string
        default: ""
      ref:
        required: false
        type: string
        default: ''

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws-region }}

      # ── Backend JAR ────────────────────────────────────────────────────
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build backend JAR
        working-directory: backend
        run: mvn clean package -DskipTests -q

      # ── CDK Setup ────────────────────────────────────────────────────────
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: CDK Prepare
        working-directory: infra/cdk
        run: |
          npm install -g aws-cdk
          dotnet restore
          dotnet build --no-restore

      - name: CDK Bootstrap
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGION=${{ inputs.aws-region }}
          BUCKET_NAME="cdk-hnb659fds-assets-${ACCOUNT_ID}-${REGION}"

          # If the CDKToolkit stack is missing but the staging bucket exists (orphaned),
          # remove the orphaned bucket so bootstrap can recreate it cleanly.
          # CDK will re-upload assets during the deploy phase.
          if ! aws cloudformation describe-stacks --stack-name CDKToolkit --region ${REGION} >/dev/null 2>&1; then
            if aws s3api head-bucket --bucket ${BUCKET_NAME} 2>/dev/null; then
              echo "Removing orphaned CDK staging bucket..."
              aws s3 rm s3://${BUCKET_NAME} --recursive --region ${REGION}
              aws s3api delete-bucket --bucket ${BUCKET_NAME} --region ${REGION}
            fi
          fi

          cdk bootstrap aws://${ACCOUNT_ID}/${REGION}

      # ── Resolve hosted zone name (defaults to domain-name) ────────────
      - name: Resolve hosted zone name
        id: zone
        run: |
          ZONE="${{ inputs.hosted-zone-name }}"
          if [ -z "$ZONE" ]; then
            ZONE="${{ inputs.domain-name }}"
          fi
          echo "name=$ZONE" >> $GITHUB_OUTPUT

      # ── Compute environment URLs ─────────────────────────────────────
      - name: Compute frontend URL
        id: urls
        run: |
          if [ "${{ inputs.environment }}" = "prod" ]; then
            echo "app_url=https://${{ inputs.domain-name }}" >> $GITHUB_OUTPUT
          else
            echo "app_url=https://${{ inputs.environment }}.${{ inputs.domain-name }}" >> $GITHUB_OUTPUT
          fi

      # ── Phase 1: Deploy foundation (Cognito, S3, Secrets) ──────────────
      - name: Cleanup foundation stack and orphaned resources
        run: |
          PREFIX="shumelahire-${{ inputs.environment }}"
          STACK_NAME="${PREFIX}-foundation"
          REGION="${{ inputs.aws-region }}"

          STATUS=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" --region "$REGION" \
            --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "DOES_NOT_EXIST")
          echo "Foundation stack status: $STATUS"

          # ROLLBACK_COMPLETE means the very first create failed — safe to delete.
          # UPDATE_ROLLBACK_COMPLETE means a previous update failed but the stack
          # has real resources — do NOT delete, just redeploy on top of it.
          # REVIEW_IN_PROGRESS means a pending change set — delete the change set.
          if [ "$STATUS" = "ROLLBACK_COMPLETE" ]; then
            echo "Deleting $STACK_NAME (initial create failed, $STATUS)..."
            aws cloudformation delete-stack --stack-name "$STACK_NAME" --region "$REGION"
            aws cloudformation wait stack-delete-complete --stack-name "$STACK_NAME" --region "$REGION"
            echo "$STACK_NAME deleted."
            STATUS="DOES_NOT_EXIST"
          elif [ "$STATUS" = "REVIEW_IN_PROGRESS" ]; then
            echo "Deleting $STACK_NAME (stuck in $STATUS)..."
            aws cloudformation delete-stack --stack-name "$STACK_NAME" --region "$REGION"
            aws cloudformation wait stack-delete-complete --stack-name "$STACK_NAME" --region "$REGION"
            echo "$STACK_NAME deleted."
            STATUS="DOES_NOT_EXIST"
          elif [ "$STATUS" = "UPDATE_ROLLBACK_COMPLETE" ]; then
            echo "$STACK_NAME is in $STATUS — will redeploy on top of existing resources."
          fi

          # Helper: check if a resource exists in the CloudFormation stack
          resource_in_stack() {
            local logical_id="$1"
            if [ "$STATUS" = "DOES_NOT_EXIST" ]; then return 1; fi
            aws cloudformation describe-stack-resource --stack-name "$STACK_NAME" --logical-resource-id "$logical_id" \
              --region "$REGION" >/dev/null 2>&1
          }

          # Delete any resources not managed by the stack.
          # No existence checks — just try to delete and ignore errors.

          # S3 buckets — delete bucket policy first (CDK AutoDeleteObjects adds a
          # restrictive policy), then empty and remove the bucket.
          for bucket_info in "docs:DocumentsBucket9EC9DEB9" "uploads:UploadsBucket5E5E9B64"; do
            SUFFIX="${bucket_info%%:*}"
            LOGICAL_ID="${bucket_info##*:}"
            BUCKET="${PREFIX}-${SUFFIX}"
            if ! resource_in_stack "$LOGICAL_ID"; then
              echo "Removing orphaned S3 bucket ${BUCKET} (if exists)..."
              aws s3api delete-bucket-policy --bucket "$BUCKET" --region "$REGION" 2>&1 || true
              aws s3 rb "s3://${BUCKET}" --force --region "$REGION" 2>&1 || true
            fi
          done

          echo "Cleanup complete."

      - name: CDK Deploy Foundation
        working-directory: infra/cdk
        env:
          SHUMELAHIRE_ENV: ${{ inputs.environment }}
          SHUMELAHIRE_DOMAIN: ${{ inputs.domain-name }}
          CERTIFICATE_ARN: ${{ secrets.CERTIFICATE_ARN }}
          API_CERTIFICATE_ARN: ${{ secrets.API_CERTIFICATE_ARN }}
          WILDCARD_CERTIFICATE_ARN: ${{ secrets.WILDCARD_CERTIFICATE_ARN }}
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
        run: |
          cdk deploy shumelahire-${{ inputs.environment }}-foundation --require-approval never \
            -c env=${{ inputs.environment }} \
            -c domain=${{ inputs.domain-name }} \
            -c hostedZoneName=${{ steps.zone.outputs.name }} \
            -c certificateArn="${CERTIFICATE_ARN}" \
            -c apiCertificateArn="${API_CERTIFICATE_ARN}" \
            -c wildcardCertificateArn="${WILDCARD_CERTIFICATE_ARN}" \
            -c linkedInClientId="${LINKEDIN_CLIENT_ID}" \
            -c linkedInClientSecret="${LINKEDIN_CLIENT_SECRET}"

      # ── Seed secrets with real values (first deploy only) ───────────────
      - name: Seed secrets
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          ENV="${{ inputs.environment }}"
          REGION="${{ inputs.aws-region }}"

          seed_if_default() {
            local secret_id="$1"
            local new_value="$2"

            # Retrieve current value; CDK creates secrets with a random placeholder
            current=$(aws secretsmanager get-secret-value --secret-id "$secret_id" \
              --region "$REGION" --query SecretString --output text 2>/dev/null || echo "MISSING")

            if [ "$current" = "MISSING" ]; then
              echo "Secret $secret_id does not exist yet, skipping."
              return
            fi

            # CDK-generated secrets are short random passwords — only overwrite
            # if the value looks like a CDK default (≤32 chars) or is empty
            if [ ${#current} -le 32 ] && [ -n "$new_value" ]; then
              aws secretsmanager put-secret-value \
                --secret-id "$secret_id" \
                --secret-string "$new_value" \
                --region "$REGION"
              echo "Seeded $secret_id"
            else
              echo "$secret_id already has a custom value, skipping."
            fi
          }

          # JWT secret — generate a strong 64-byte base64 key
          JWT_VALUE=$(openssl rand -base64 64 | tr -d '\n')
          seed_if_default "shumelahire/${ENV}/jwt-secret" "$JWT_VALUE"

          # Encryption key — generate a 32-byte (AES-256) base64 key
          ENC_VALUE=$(openssl rand -base64 32 | tr -d '\n')
          seed_if_default "shumelahire/${ENV}/encryption-key" "$ENC_VALUE"

          # Claude API key — from GitHub secret
          if [ -n "$CLAUDE_API_KEY" ]; then
            seed_if_default "shumelahire/${ENV}/ai-keys" "$CLAUDE_API_KEY"
          else
            echo "WARNING: CLAUDE_API_KEY not set — AI features will fail at runtime."
          fi

      # ── Get CDK outputs (Cognito IDs for frontend build) ────────────────
      - name: Get CDK outputs
        id: cdk-outputs
        run: |
          PREFIX="shumelahire-${{ inputs.environment }}"
          echo "user_pool_id=$(aws cloudformation describe-stacks --stack-name ${PREFIX}-foundation --query 'Stacks[0].Outputs[?OutputKey==`UserPoolId`].OutputValue' --output text)" >> $GITHUB_OUTPUT
          echo "user_pool_client_id=$(aws cloudformation describe-stacks --stack-name ${PREFIX}-foundation --query 'Stacks[0].Outputs[?OutputKey==`UserPoolClientId`].OutputValue' --output text)" >> $GITHUB_OUTPUT
          echo "cognito_domain=$(aws cloudformation describe-stacks --stack-name ${PREFIX}-foundation --query 'Stacks[0].Outputs[?OutputKey==`CognitoDomain`].OutputValue' --output text)" >> $GITHUB_OUTPUT

      # ── Phase 2: Build frontend + deploy ─────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Build frontend static export
        env:
          STATIC_EXPORT: "true"
          NEXT_PUBLIC_API_URL: ""
          NEXT_PUBLIC_APP_URL: ${{ steps.urls.outputs.app_url }}
          NEXT_PUBLIC_COGNITO_USER_POOL_ID: ${{ steps.cdk-outputs.outputs.user_pool_id }}
          NEXT_PUBLIC_COGNITO_CLIENT_ID: ${{ steps.cdk-outputs.outputs.user_pool_client_id }}
          NEXT_PUBLIC_COGNITO_DOMAIN: ${{ steps.cdk-outputs.outputs.cognito_domain }}
          NEXT_PUBLIC_REGION: ${{ inputs.aws-region }}
        run: |
          npm ci
          npm run build

      # ── Deploy Lambda function ───────────────────────────────────────
      - name: Deploy Lambda function
        run: |
          PREFIX="shumelahire-${{ inputs.environment }}"
          FUNCTION_NAME="${PREFIX}-api"
          JAR_PATH="backend/target/shumelahire-backend.jar"
          REGION="${{ inputs.aws-region }}"

          # Check if the Lambda function exists (created by CDK serverless stack)
          if aws lambda get-function --function-name "$FUNCTION_NAME" --region "$REGION" 2>/dev/null; then
            echo "Uploading JAR to S3..."
            DEPLOY_BUCKET="${PREFIX}-deploy-artifacts"
            S3_KEY="lambda/${FUNCTION_NAME}/${{ github.sha }}.jar"

            # Create deploy bucket if it doesn't exist
            aws s3api head-bucket --bucket "$DEPLOY_BUCKET" --region "$REGION" 2>/dev/null || \
              aws s3api create-bucket --bucket "$DEPLOY_BUCKET" --region "$REGION" \
                --create-bucket-configuration LocationConstraint="$REGION"

            aws s3 cp "$JAR_PATH" "s3://${DEPLOY_BUCKET}/${S3_KEY}" --region "$REGION"

            echo "Updating Lambda function code from S3..."
            aws lambda update-function-code \
              --function-name "$FUNCTION_NAME" \
              --s3-bucket "$DEPLOY_BUCKET" \
              --s3-key "$S3_KEY" \
              --region "$REGION"

            echo "Waiting for function update..."
            aws lambda wait function-updated-v2 --function-name "$FUNCTION_NAME" --region "$REGION"

            echo "Publishing new version..."
            VERSION=$(aws lambda publish-version \
              --function-name "$FUNCTION_NAME" \
              --description "Deploy ${{ github.sha }}" \
              --region "$REGION" \
              --query 'Version' --output text)
            echo "Published Lambda version: $VERSION"
          else
            echo "Lambda function $FUNCTION_NAME not found — serverless stack not yet deployed. Skipping."
          fi

      # ── Phase 3: Deploy all remaining stacks ─────────────────────────
      - name: Cleanup ROLLBACK_COMPLETE stacks
        run: |
          PREFIX="shumelahire-${{ inputs.environment }}"
          for STACK_NAME in "${PREFIX}-api" "${PREFIX}-frontend" "${PREFIX}-serverless" "${PREFIX}-analytics"; do
            STATUS=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" --region ${{ inputs.aws-region }} \
              --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "DOES_NOT_EXIST")
            if [ "$STATUS" = "ROLLBACK_COMPLETE" ]; then
              echo "Deleting $STACK_NAME (initial create failed, $STATUS)..."
              aws cloudformation delete-stack --stack-name "$STACK_NAME" --region ${{ inputs.aws-region }}
              aws cloudformation wait stack-delete-complete --stack-name "$STACK_NAME" --region ${{ inputs.aws-region }}
              echo "$STACK_NAME deleted."
            elif [ "$STATUS" = "UPDATE_ROLLBACK_COMPLETE" ]; then
              echo "$STACK_NAME is in $STATUS — will redeploy on top of existing resources."
            fi
          done

      - name: CDK Deploy All Stacks
        working-directory: infra/cdk
        env:
          SHUMELAHIRE_ENV: ${{ inputs.environment }}
          SHUMELAHIRE_DOMAIN: ${{ inputs.domain-name }}
          CERTIFICATE_ARN: ${{ secrets.CERTIFICATE_ARN }}
          API_CERTIFICATE_ARN: ${{ secrets.API_CERTIFICATE_ARN }}
          WILDCARD_CERTIFICATE_ARN: ${{ secrets.WILDCARD_CERTIFICATE_ARN }}
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
        run: |
          cdk deploy --all --require-approval never --concurrency 1 \
            -c env=${{ inputs.environment }} \
            -c domain=${{ inputs.domain-name }} \
            -c hostedZoneName=${{ steps.zone.outputs.name }} \
            -c certificateArn="${CERTIFICATE_ARN}" \
            -c apiCertificateArn="${API_CERTIFICATE_ARN}" \
            -c wildcardCertificateArn="${WILDCARD_CERTIFICATE_ARN}" \
            -c linkedInClientId="${LINKEDIN_CLIENT_ID}" \
            -c linkedInClientSecret="${LINKEDIN_CLIENT_SECRET}"

      # ── Deploy frontend to S3 (after CDK creates the bucket) ────────
      - name: Deploy frontend to S3
        run: |
          PREFIX="shumelahire-${{ inputs.environment }}"
          FRONTEND_BUCKET="${PREFIX}-frontend"
          REGION="${{ inputs.aws-region }}"

          echo "Syncing static export to s3://${FRONTEND_BUCKET}/ ..."
          aws s3 sync out/ "s3://${FRONTEND_BUCKET}/" --delete --region "$REGION"

          # Invalidate CloudFront cache
          CF_DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name "${PREFIX}-frontend" \
            --region "$REGION" \
            --query 'Stacks[0].Outputs[?OutputKey==`DistributionId`].OutputValue' \
            --output text 2>/dev/null || echo "")

          if [ -n "$CF_DIST_ID" ] && [ "$CF_DIST_ID" != "None" ]; then
            echo "Invalidating CloudFront distribution ${CF_DIST_ID}..."
            aws cloudfront create-invalidation \
              --distribution-id "$CF_DIST_ID" \
              --paths "/*"
          else
            echo "CloudFront distribution not found — skipping invalidation."
          fi

