name: Deploy

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      aws-region:
        required: true
        type: string
        default: af-south-1
      domain-name:
        required: true
        type: string
        default: shumelahire.co.za
      hosted-zone-name:
        required: false
        type: string
        default: ""
      ref:
        required: false
        type: string
        default: ''

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws-region }}

      # ── Backend JAR ────────────────────────────────────────────────────
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build backend JAR
        working-directory: backend
        run: mvn clean package -DskipTests -q

      # ── CDK Setup ────────────────────────────────────────────────────────
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: CDK Prepare
        working-directory: infra/cdk
        run: |
          npm install -g aws-cdk
          dotnet restore
          dotnet build --no-restore

      - name: CDK Bootstrap
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGION=${{ inputs.aws-region }}
          BUCKET_NAME="cdk-hnb659fds-assets-${ACCOUNT_ID}-${REGION}"

          # If the CDKToolkit stack is missing but the staging bucket exists (orphaned),
          # remove the orphaned bucket so bootstrap can recreate it cleanly.
          # CDK will re-upload assets during the deploy phase.
          if ! aws cloudformation describe-stacks --stack-name CDKToolkit --region ${REGION} >/dev/null 2>&1; then
            if aws s3api head-bucket --bucket ${BUCKET_NAME} 2>/dev/null; then
              echo "Removing orphaned CDK staging bucket..."
              aws s3 rm s3://${BUCKET_NAME} --recursive --region ${REGION}
              aws s3api delete-bucket --bucket ${BUCKET_NAME} --region ${REGION}
            fi
          fi

          cdk bootstrap aws://${ACCOUNT_ID}/${REGION}

      # ── Resolve hosted zone name (defaults to domain-name) ────────────
      - name: Resolve hosted zone name
        id: zone
        run: |
          ZONE="${{ inputs.hosted-zone-name }}"
          if [ -z "$ZONE" ]; then
            ZONE="${{ inputs.domain-name }}"
          fi
          echo "name=$ZONE" >> $GITHUB_OUTPUT

      # ── Compute environment URLs ─────────────────────────────────────
      - name: Compute frontend URL
        id: urls
        run: |
          if [ "${{ inputs.environment }}" = "prod" ]; then
            echo "app_url=https://${{ inputs.domain-name }}" >> $GITHUB_OUTPUT
          else
            echo "app_url=https://${{ inputs.environment }}.${{ inputs.domain-name }}" >> $GITHUB_OUTPUT
          fi

      # ── Phase 1: Deploy foundation (Cognito, S3, Secrets) ──────────────
      - name: Cleanup foundation stack and orphaned resources
        run: |
          PREFIX="shumelahire-${{ inputs.environment }}"
          STACK_NAME="${PREFIX}-foundation"
          REGION="${{ inputs.aws-region }}"

          STATUS=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" --region "$REGION" \
            --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "DOES_NOT_EXIST")
          echo "Foundation stack status: $STATUS"

          # ROLLBACK_COMPLETE means the very first create failed — safe to delete.
          # UPDATE_ROLLBACK_COMPLETE means a previous update failed but the stack
          # has real resources — do NOT delete, just redeploy on top of it.
          # REVIEW_IN_PROGRESS means a pending change set — delete the change set.
          if [ "$STATUS" = "ROLLBACK_COMPLETE" ]; then
            echo "Deleting $STACK_NAME (initial create failed, $STATUS)..."
            aws cloudformation delete-stack --stack-name "$STACK_NAME" --region "$REGION"
            aws cloudformation wait stack-delete-complete --stack-name "$STACK_NAME" --region "$REGION"
            echo "$STACK_NAME deleted."
            STATUS="DOES_NOT_EXIST"
          elif [ "$STATUS" = "REVIEW_IN_PROGRESS" ]; then
            echo "Deleting $STACK_NAME (stuck in $STATUS)..."
            aws cloudformation delete-stack --stack-name "$STACK_NAME" --region "$REGION"
            aws cloudformation wait stack-delete-complete --stack-name "$STACK_NAME" --region "$REGION"
            echo "$STACK_NAME deleted."
            STATUS="DOES_NOT_EXIST"
          elif [ "$STATUS" = "UPDATE_ROLLBACK_COMPLETE" ]; then
            echo "$STACK_NAME is in $STATUS — will redeploy on top of existing resources."
          fi

          # Helper: check if a resource exists in the CloudFormation stack
          resource_in_stack() {
            local logical_id="$1"
            if [ "$STATUS" = "DOES_NOT_EXIST" ]; then return 1; fi
            aws cloudformation describe-stack-resource --stack-name "$STACK_NAME" --logical-resource-id "$logical_id" \
              --region "$REGION" >/dev/null 2>&1
          }

          # Delete any resources not managed by the stack.
          # No existence checks — just try to delete and ignore errors.

          # S3 buckets — delete bucket policy first (CDK AutoDeleteObjects adds a
          # restrictive policy), then empty and remove the bucket.
          for bucket_info in "docs:DocumentsBucket9EC9DEB9" "uploads:UploadsBucket5E5E9B64"; do
            SUFFIX="${bucket_info%%:*}"
            LOGICAL_ID="${bucket_info##*:}"
            BUCKET="${PREFIX}-${SUFFIX}"
            if ! resource_in_stack "$LOGICAL_ID"; then
              echo "Removing orphaned S3 bucket ${BUCKET} (if exists)..."
              aws s3api delete-bucket-policy --bucket "$BUCKET" --region "$REGION" 2>&1 || true
              aws s3 rb "s3://${BUCKET}" --force --region "$REGION" 2>&1 || true
            fi
          done

          echo "Cleanup complete."

      - name: CDK Deploy Foundation
        working-directory: infra/cdk
        env:
          SHUMELAHIRE_ENV: ${{ inputs.environment }}
          SHUMELAHIRE_DOMAIN: ${{ inputs.domain-name }}
          CERTIFICATE_ARN: ${{ secrets.CERTIFICATE_ARN }}
          API_CERTIFICATE_ARN: ${{ secrets.API_CERTIFICATE_ARN }}
          WILDCARD_CERTIFICATE_ARN: ${{ secrets.WILDCARD_CERTIFICATE_ARN }}
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
        run: |
          cdk deploy shumelahire-${{ inputs.environment }}-foundation --require-approval never \
            -c env=${{ inputs.environment }} \
            -c domain=${{ inputs.domain-name }} \
            -c hostedZoneName=${{ steps.zone.outputs.name }} \
            -c certificateArn="${CERTIFICATE_ARN}" \
            -c apiCertificateArn="${API_CERTIFICATE_ARN}" \
            -c wildcardCertificateArn="${WILDCARD_CERTIFICATE_ARN}" \
            -c linkedInClientId="${LINKEDIN_CLIENT_ID}" \
            -c linkedInClientSecret="${LINKEDIN_CLIENT_SECRET}"

      # ── Seed secrets with real values (first deploy only) ───────────────
      - name: Seed secrets
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          ENV="${{ inputs.environment }}"
          REGION="${{ inputs.aws-region }}"

          seed_if_default() {
            local secret_id="$1"
            local new_value="$2"

            # Retrieve current value; CDK creates secrets with a random placeholder
            current=$(aws secretsmanager get-secret-value --secret-id "$secret_id" \
              --region "$REGION" --query SecretString --output text 2>/dev/null || echo "MISSING")

            if [ "$current" = "MISSING" ]; then
              echo "Secret $secret_id does not exist yet, skipping."
              return
            fi

            # CDK-generated secrets are short random passwords — only overwrite
            # if the value looks like a CDK default (≤32 chars) or is empty
            if [ ${#current} -le 32 ] && [ -n "$new_value" ]; then
              aws secretsmanager put-secret-value \
                --secret-id "$secret_id" \
                --secret-string "$new_value" \
                --region "$REGION"
              echo "Seeded $secret_id"
            else
              echo "$secret_id already has a custom value, skipping."
            fi
          }

          # JWT secret — generate a strong 64-byte base64 key
          JWT_VALUE=$(openssl rand -base64 64 | tr -d '\n')
          seed_if_default "shumelahire/${ENV}/jwt-secret" "$JWT_VALUE"

          # Encryption key — generate a 32-byte (AES-256) base64 key
          ENC_VALUE=$(openssl rand -base64 32 | tr -d '\n')
          seed_if_default "shumelahire/${ENV}/encryption-key" "$ENC_VALUE"

          # Claude API key — from GitHub secret
          if [ -n "$CLAUDE_API_KEY" ]; then
            seed_if_default "shumelahire/${ENV}/ai-keys" "$CLAUDE_API_KEY"
          else
            echo "WARNING: CLAUDE_API_KEY not set — AI features will fail at runtime."
          fi

      # ── Get CDK outputs (Cognito IDs for frontend build) ────────────────
      - name: Get CDK outputs
        id: cdk-outputs
        run: |
          PREFIX="shumelahire-${{ inputs.environment }}"
          echo "user_pool_id=$(aws cloudformation describe-stacks --stack-name ${PREFIX}-foundation --query 'Stacks[0].Outputs[?OutputKey==`UserPoolId`].OutputValue' --output text)" >> $GITHUB_OUTPUT
          echo "user_pool_client_id=$(aws cloudformation describe-stacks --stack-name ${PREFIX}-foundation --query 'Stacks[0].Outputs[?OutputKey==`UserPoolClientId`].OutputValue' --output text)" >> $GITHUB_OUTPUT
          echo "cognito_domain=$(aws cloudformation describe-stacks --stack-name ${PREFIX}-foundation --query 'Stacks[0].Outputs[?OutputKey==`CognitoDomain`].OutputValue' --output text)" >> $GITHUB_OUTPUT

      # ── Phase 2: Build frontend + deploy ─────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Build frontend static export
        env:
          STATIC_EXPORT: "true"
          NEXT_PUBLIC_API_URL: ""
          NEXT_PUBLIC_APP_URL: ${{ steps.urls.outputs.app_url }}
          NEXT_PUBLIC_COGNITO_USER_POOL_ID: ${{ steps.cdk-outputs.outputs.user_pool_id }}
          NEXT_PUBLIC_COGNITO_CLIENT_ID: ${{ steps.cdk-outputs.outputs.user_pool_client_id }}
          NEXT_PUBLIC_COGNITO_DOMAIN: ${{ steps.cdk-outputs.outputs.cognito_domain }}
          NEXT_PUBLIC_REGION: ${{ inputs.aws-region }}
        run: |
          npm ci
          npm run build

      # ── Phase 3: Deploy all remaining stacks ─────────────────────────
      - name: Cleanup ROLLBACK_COMPLETE stacks
        run: |
          PREFIX="shumelahire-${{ inputs.environment }}"
          for STACK_NAME in "${PREFIX}-api" "${PREFIX}-frontend" "${PREFIX}-serverless" "${PREFIX}-analytics"; do
            STATUS=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" --region ${{ inputs.aws-region }} \
              --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "DOES_NOT_EXIST")
            if [ "$STATUS" = "ROLLBACK_COMPLETE" ]; then
              echo "Deleting $STACK_NAME (initial create failed, $STATUS)..."
              aws cloudformation delete-stack --stack-name "$STACK_NAME" --region ${{ inputs.aws-region }}
              aws cloudformation wait stack-delete-complete --stack-name "$STACK_NAME" --region ${{ inputs.aws-region }}
              echo "$STACK_NAME deleted."
            elif [ "$STATUS" = "UPDATE_ROLLBACK_COMPLETE" ]; then
              echo "$STACK_NAME is in $STATUS — will redeploy on top of existing resources."
            fi
          done

      - name: CDK Deploy All Stacks
        working-directory: infra/cdk
        env:
          SHUMELAHIRE_ENV: ${{ inputs.environment }}
          SHUMELAHIRE_DOMAIN: ${{ inputs.domain-name }}
          CERTIFICATE_ARN: ${{ secrets.CERTIFICATE_ARN }}
          API_CERTIFICATE_ARN: ${{ secrets.API_CERTIFICATE_ARN }}
          WILDCARD_CERTIFICATE_ARN: ${{ secrets.WILDCARD_CERTIFICATE_ARN }}
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
        run: |
          cdk deploy --all --require-approval never --concurrency 1 \
            -c env=${{ inputs.environment }} \
            -c domain=${{ inputs.domain-name }} \
            -c hostedZoneName=${{ steps.zone.outputs.name }} \
            -c certificateArn="${CERTIFICATE_ARN}" \
            -c apiCertificateArn="${API_CERTIFICATE_ARN}" \
            -c wildcardCertificateArn="${WILDCARD_CERTIFICATE_ARN}" \
            -c linkedInClientId="${LINKEDIN_CLIENT_ID}" \
            -c linkedInClientSecret="${LINKEDIN_CLIENT_SECRET}"

      # ── Deploy frontend to S3 (after CDK creates the bucket) ────────
      - name: Deploy frontend to S3
        run: |
          PREFIX="shumelahire-${{ inputs.environment }}"
          FRONTEND_BUCKET="${PREFIX}-frontend"
          REGION="${{ inputs.aws-region }}"

          echo "Syncing static export to s3://${FRONTEND_BUCKET}/ ..."
          aws s3 sync out/ "s3://${FRONTEND_BUCKET}/" --delete --region "$REGION"

          # Invalidate CloudFront cache
          CF_DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name "${PREFIX}-frontend" \
            --region "$REGION" \
            --query 'Stacks[0].Outputs[?OutputKey==`DistributionId`].OutputValue' \
            --output text 2>/dev/null || echo "")

          if [ -n "$CF_DIST_ID" ] && [ "$CF_DIST_ID" != "None" ]; then
            echo "Invalidating CloudFront distribution ${CF_DIST_ID}..."
            aws cloudfront create-invalidation \
              --distribution-id "$CF_DIST_ID" \
              --paths "/*"
          else
            echo "CloudFront distribution not found — skipping invalidation."
          fi

      # ── Seed demo data (dev only, first deploy) ───────────────────────
      - name: Wait for Lambda readiness
        if: inputs.environment == 'dev'
        run: |
          PREFIX="shumelahire-${{ inputs.environment }}"
          REGION="${{ inputs.aws-region }}"
          FUNCTION_NAME=$(aws cloudformation describe-stacks \
            --stack-name "${PREFIX}-serverless" \
            --region "$REGION" \
            --query 'Stacks[0].Outputs[?OutputKey==`ApiLambdaFunctionName`].OutputValue' \
            --output text 2>/dev/null || echo "")
          if [ -z "$FUNCTION_NAME" ] || [ "$FUNCTION_NAME" = "None" ]; then
            echo "Could not resolve Lambda function name from CDK outputs — skipping."
            exit 0
          fi
          echo "Waiting for Lambda $FUNCTION_NAME to be ready..."
          for i in $(seq 1 12); do
            STATUS=$(aws lambda get-function --function-name "$FUNCTION_NAME" --region "$REGION" \
              --query 'Configuration.LastUpdateStatus' --output text 2>/dev/null || echo "NotFound")
            if [ "$STATUS" = "Successful" ]; then
              echo "Lambda is ready."
              break
            fi
            echo "  Status: $STATUS — waiting 10s... ($i/12)"
            sleep 10
          done

          # Warm up the Lambda by invoking it directly (bypasses API Gateway's
          # 30s timeout). Spring Boot init takes ~25s on cold start.
          echo "Warming up Lambda via direct invocation (cold start may take ~30s)..."
          WARMUP_PAYLOAD='{"version":"2.0","routeKey":"GET /api/actuator/health","rawPath":"/api/actuator/health","rawQueryString":"","headers":{},"requestContext":{"http":{"method":"GET","path":"/api/actuator/health","protocol":"HTTP/1.1","sourceIp":"127.0.0.1"},"requestId":"warmup","routeKey":"GET /api/actuator/health","stage":"$default"},"isBase64Encoded":false}'
          echo "$WARMUP_PAYLOAD" > /tmp/warmup-payload.json
          for attempt in 1 2 3; do
            aws lambda invoke \
              --function-name "$FUNCTION_NAME" \
              --payload 'fileb:///tmp/warmup-payload.json' \
              --cli-read-timeout 120 \
              --region "$REGION" \
              /tmp/warmup-response.json >/dev/null 2>&1
            STATUS_CODE=$(python3 -c "import json; print(json.load(open('/tmp/warmup-response.json')).get('statusCode','error'))" 2>/dev/null || echo "error")
            echo "  Warmup attempt $attempt: Lambda returned $STATUS_CODE"
            if [ "$STATUS_CODE" != "error" ]; then
              echo "Lambda is warm."
              break
            fi
            sleep 5
          done

      - name: Seed demo data
        if: inputs.environment == 'dev'
        continue-on-error: true
        env:
          COGNITO_USER_POOL_ID: ${{ steps.cdk-outputs.outputs.user_pool_id }}
          COGNITO_CLIENT_ID: ${{ steps.cdk-outputs.outputs.user_pool_client_id }}
          AWS_REGION: ${{ inputs.aws-region }}
          DEMO_PASSWORD: "Demo@2026!"
        run: |
          set +e  # Don't exit on error — seed failures should not break deployment
          PREFIX="shumelahire-${{ inputs.environment }}"
          REGION="${{ inputs.aws-region }}"

          # Resolve the API URL from the serverless stack output
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name "${PREFIX}-serverless" \
            --region "$REGION" \
            --query 'Stacks[0].Outputs[?OutputKey==`HttpApiUrl`].OutputValue' \
            --output text 2>/dev/null || echo "")

          if [ -z "$API_URL" ] || [ "$API_URL" = "None" ]; then
            echo "Could not resolve API URL — skipping seed."
            exit 0
          fi

          echo "API URL: $API_URL"

          # Check if tenant already exists by trying to resolve it
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${API_URL}/api/public/tenants/resolve/uthukela" 2>/dev/null || echo "000")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "uThukela tenant already exists — checking employee count..."

            # Authenticate to check employee count
            AUTH_RESULT=$(aws cognito-idp initiate-auth \
              --client-id "$COGNITO_CLIENT_ID" \
              --auth-flow USER_PASSWORD_AUTH \
              --auth-parameters USERNAME=admin@uthukela.shumelahire.co.za,PASSWORD="$DEMO_PASSWORD" \
              --region "$REGION" \
              --output json 2>/dev/null || echo "{}")

            ID_TOKEN=$(echo "$AUTH_RESULT" | jq -r '.AuthenticationResult.IdToken // empty')

            if [ -n "$ID_TOKEN" ]; then
              TENANT_INFO=$(curl -s "${API_URL}/api/public/tenants/resolve/uthukela" 2>/dev/null)
              TENANT_ID=$(echo "$TENANT_INFO" | jq -r '.id // empty')

              EMP_RESPONSE=$(curl -s -H "Authorization: Bearer $ID_TOKEN" \
                -H "X-Tenant-Id: $TENANT_ID" \
                "${API_URL}/api/employees?size=1" 2>/dev/null)
              EMP_COUNT=$(echo "$EMP_RESPONSE" | jq -r '.totalElements // .total // 0' 2>/dev/null)

              if [ "$EMP_COUNT" -gt 0 ] 2>/dev/null; then
                echo "Employees already seeded ($EMP_COUNT found) — skipping."
                exit 0
              fi
            fi

            echo "Tenant exists but no employees — seeding via direct DynamoDB write..."
            # Resolve DynamoDB table name from CDK outputs
            TABLE_NAME=$(aws cloudformation describe-stacks \
              --stack-name "${PREFIX}-serverless" \
              --region "$REGION" \
              --query 'Stacks[0].Outputs[?OutputKey==`DynamoDbTableName`].OutputValue' \
              --output text 2>/dev/null || echo "")
            if [ -z "$TABLE_NAME" ] || [ "$TABLE_NAME" = "None" ]; then
              TABLE_NAME="${PREFIX}-data"
            fi
            export DYNAMODB_TABLE_NAME="$TABLE_NAME"
            export TENANT_ID="uthukela"
            export AWS_REGION="$REGION"
            pip install cryptography -q 2>/dev/null
            python3 scripts/seed-employees-dynamodb.py || echo "WARNING: Employee seeding had errors (non-fatal)"
            python3 scripts/seed-leave-dynamodb.py || echo "WARNING: Leave seeding had errors (non-fatal)"
            python3 scripts/seed-recruitment-dynamodb.py || echo "WARNING: Recruitment seeding had errors (non-fatal)"
            python3 scripts/seed-performance-dynamodb.py || echo "WARNING: Performance review seeding had errors (non-fatal)"
            python3 scripts/seed-training-dynamodb.py || echo "WARNING: Training seeding had errors (non-fatal)"
            python3 scripts/seed-sage-dynamodb.py || echo "WARNING: Sage integration seeding had errors (non-fatal)"
            python3 scripts/seed-sage-evolution-dynamodb.py || echo "WARNING: Sage Evolution seeding had errors (non-fatal)"
            python3 scripts/seed-engagement-dynamodb.py || echo "WARNING: Engagement seeding had errors (non-fatal)"
          else
            echo "uThukela tenant does not exist — running full setup..."

            # Step 1: Create Cognito users first
            export TENANT_ID="uthukela"
            chmod +x scripts/seed-uthukela-water-cognito-users.sh
            bash scripts/seed-uthukela-water-cognito-users.sh || echo "WARNING: Cognito user seeding had errors (non-fatal)"

            # Step 2: Create tenant, departments, jobs, and additional users
            export API_BASE_URL="$API_URL"
            export ADMIN_EMAIL="admin@uthukela.shumelahire.co.za"
            export ADMIN_PASSWORD="$DEMO_PASSWORD"
            export TENANT_ADMIN_PASSWORD="$DEMO_PASSWORD"
            chmod +x scripts/seed-uthukela-demo.sh
            bash scripts/seed-uthukela-demo.sh || echo "WARNING: Tenant/demo seeding had errors (non-fatal)"

            # Step 3: Create 10 employee profiles (direct DynamoDB write)
            TABLE_NAME=$(aws cloudformation describe-stacks \
              --stack-name "${PREFIX}-serverless" \
              --region "$REGION" \
              --query 'Stacks[0].Outputs[?OutputKey==`DynamoDbTableName`].OutputValue' \
              --output text 2>/dev/null || echo "")
            if [ -z "$TABLE_NAME" ] || [ "$TABLE_NAME" = "None" ]; then
              TABLE_NAME="${PREFIX}-data"
            fi
            export DYNAMODB_TABLE_NAME="$TABLE_NAME"
            export TENANT_ID="uthukela"
            pip install cryptography -q 2>/dev/null
            python3 scripts/seed-employees-dynamodb.py || echo "WARNING: Employee seeding had errors (non-fatal)"
            python3 scripts/seed-leave-dynamodb.py || echo "WARNING: Leave seeding had errors (non-fatal)"
            python3 scripts/seed-recruitment-dynamodb.py || echo "WARNING: Recruitment seeding had errors (non-fatal)"
            python3 scripts/seed-performance-dynamodb.py || echo "WARNING: Performance review seeding had errors (non-fatal)"
            python3 scripts/seed-training-dynamodb.py || echo "WARNING: Training seeding had errors (non-fatal)"
            python3 scripts/seed-sage-dynamodb.py || echo "WARNING: Sage integration seeding had errors (non-fatal)"
            python3 scripts/seed-sage-evolution-dynamodb.py || echo "WARNING: Sage Evolution seeding had errors (non-fatal)"
            python3 scripts/seed-engagement-dynamodb.py || echo "WARNING: Engagement seeding had errors (non-fatal)"
          fi

          echo "Demo data seeding complete."

