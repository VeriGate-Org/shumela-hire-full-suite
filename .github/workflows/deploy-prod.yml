name: Deploy to Production

on:
  push:
    tags: ['v*']

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: ci
    uses: ./.github/workflows/deploy.yml
    with:
      environment: prod
      aws-region: af-south-1
      domain-name: shumelahire.co.za
    secrets: inherit
