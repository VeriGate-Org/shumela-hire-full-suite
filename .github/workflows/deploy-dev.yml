name: Deploy to Dev

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: ci
    uses: ./.github/workflows/deploy.yml
    with:
      environment: dev
      aws-region: af-south-1
      domain-name: shumelahire.co.za
      hosted-zone-name: dev.shumelahire.co.za
    secrets: inherit
